name: Feature Request
description: Propose a new feature or improvement.
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a request, please check that no existing issue or PR already covers it.
        For large architectural changes, discuss on an issue first before writing code.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched [existing issues](https://github.com/teoritty/xray2wg/issues) and this has not been requested before.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve, or what workflow does it improve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the behaviour you would like and why it is the right approach.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you consider and why did you rule it out?

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, references, related issues, etc.
