name: Bug Report
description: Report a reproducible bug or unexpected behaviour.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out every section as completely as possible — incomplete reports are harder to triage and may be closed.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched [existing issues](https://github.com/teoritty/xray2wg/issues) and this has not been reported before.
          required: true
        - label: I am running the latest image / commit.
          required: true
        - label: I have read the [README](https://github.com/teoritty/xray2wg/blob/main/README.md).
          required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `docker inspect xray2wg --format '{{ "{{" }}.Config.Image{{ "}}" }}'` or the git SHA.
      placeholder: "e.g. xray2wg:latest @ abc1234"
    validations:
      required: true

  - type: input
    id: host_os
    attributes:
      label: Host OS and kernel
      description: "`uname -sr` output."
      placeholder: "e.g. Linux 6.8.0-41-generic"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the container with …
        2. Create a tunnel with …
        3. Observe …
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Paste container logs (`docker compose logs --tail 200 xray2wg`).
        Set `LOG_LEVEL=debug` and `XRAY_LOG_LEVEL=debug` before reproducing.
      render: text

  - type: textarea
    id: config
    attributes:
      label: docker-compose.yml (sanitised)
      description: Remove any secrets before pasting.
      render: yaml

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, packet captures, related issues, etc.
